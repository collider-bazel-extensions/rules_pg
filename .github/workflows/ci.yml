name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # Hermetic mode (pg.version()) — runner has NO host postgres
  # installed. Proves the conda-closure extraction + the toolchain
  # binaries work without any system pg_ctl / initdb / psql / etc.
  # on PATH. rules_pg's own MODULE.bazel uses pg.version() for all
  # three majors (14/15/16) so the full test matrix runs hermetically.
  #
  # pg.system() is exercised by consumers who opt in via tag; the
  # plumbing is unchanged from v0.3.0 and is consumer-tested
  # implicitly.
  hermetic:
    name: bazel test (ubuntu-latest, hermetic pg.version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-hermetic
          repository-cache: true

      # Belt-and-suspenders: verify no host postgres binaries are on
      # PATH at the start. If any are present, fail fast — the test
      # would otherwise silently use them and we'd lose the hermetic
      # signal.
      - name: Verify NO host postgres on PATH
        run: |
          set -euo pipefail
          for bin in pg_ctl initdb postgres; do
            if command -v "$bin" >/dev/null 2>&1; then
              echo "FAIL: $bin found at $(command -v "$bin"); hermetic test would be meaningless" >&2
              exit 1
            fi
          done
          echo "OK — no host postgres detected; hermetic mode test is meaningful"

      - name: bazel test //tests/...
        run: bazel test //tests/... --test_output=errors

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-hermetic
          path: bazel-testlogs/
          if-no-files-found: ignore
